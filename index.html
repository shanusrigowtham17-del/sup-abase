<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apple: {
                            bg: '#f5f5f7',
                            text: '#1d1d1f',
                            subtext: '#86868b',
                            border: '#d2d2d7',
                            blue: '#0066cc',
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Premium Animations */
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Spinner */
        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Smooth Inputs */
        input:focus { outline: none; box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.15); border-color: #0066cc; }
        button { transition: all 0.2s ease; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-apple-bg text-apple-text min-h-screen flex items-center justify-center p-4 selection:bg-black selection:text-white antialiased">

    <div id="auth-view" class="w-full max-w-[400px] bg-white rounded-[24px] shadow-[0_8px_32px_rgba(0,0,0,0.06)] p-10 slide-up border border-white/50 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 id="form-title" class="text-[28px] font-semibold tracking-tight mb-2">Sign In</h1>
            <p class="text-apple-subtext text-[15px]">
                <span id="toggle-text">Don't have an account?</span> 
                <button id="btn-toggle" class="text-apple-blue hover:underline font-medium">Create one</button>
            </p>
        </div>

        <div id="alert-box" class="hidden mb-6 p-4 rounded-xl text-sm font-medium text-center"></div>

        <form id="auth-form" class="space-y-4">
            <div>
                <input type="email" id="email" placeholder="Email address" required 
                       class="w-full px-4 py-3.5 bg-[#fafafa] border border-apple-border rounded-xl text-[15px] placeholder-gray-400 transition-all">
            </div>
            <div>
                <input type="password" id="password" placeholder="Password" required 
                       class="w-full px-4 py-3.5 bg-[#fafafa] border border-apple-border rounded-xl text-[15px] placeholder-gray-400 transition-all">
            </div>
            
            <button type="submit" id="btn-submit" 
                    class="w-full bg-black text-white py-3.5 rounded-full font-medium tracking-wide hover:bg-gray-800 disabled:opacity-70 mt-2 flex justify-center items-center h-[52px]">
                <span id="btn-submit-text">Continue</span>
                <div id="loading-spinner" class="spinner hidden"></div>
            </button>
        </form>

        <div class="my-7 flex items-center">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="px-4 text-xs uppercase tracking-wider text-apple-subtext font-semibold">Or</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <button id="btn-google" 
                class="w-full bg-white border border-apple-border text-apple-text py-3.5 rounded-full font-medium hover:bg-gray-50 flex items-center justify-center gap-3 h-[52px]">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
            </svg>
            Continue with Google
        </button>
    </div>

    <div id="dashboard-view" class="w-full max-w-[400px] bg-white rounded-[24px] shadow-[0_8px_32px_rgba(0,0,0,0.06)] p-10 text-center fade-in hidden">
        <div class="w-20 h-20 bg-gradient-to-tr from-gray-900 to-gray-700 text-white rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-lg">
            👋
        </div>
        <h1 class="text-2xl font-semibold tracking-tight mb-2">Welcome back</h1>
        <p id="user-email-display" class="text-apple-subtext mb-8 text-[15px]"></p>
        <button id="btn-logout" class="w-full bg-apple-bg text-apple-text py-3.5 rounded-full font-medium hover:bg-gray-200 transition-colors">
            Sign Out
        </button>
    </div>

    <script>
        // --- 1. YOUR CREDENTIALS HERE ---
        const SUPABASE_URL = 'https://ndgrpmglkdmdvqmhzxrp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZ3JwbWdsa2RtZHZxbWh6eHJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzU2OTAsImV4cCI6MjA5OTc1MTY5MH0.Sett9S-neEhpdQQK8bes4ZEqLLRy_azKQ3AuVgPzVV0';
        
        // FIXED: Renamed local variable to supabaseClient to prevent crashing
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. STATE & DOM ELEMENTS ---
        let isLoginMode = true;
        
        const views = { auth: document.getElementById('auth-view'), dashboard: document.getElementById('dashboard-view') };
        const form = document.getElementById('auth-form');
        const inputs = { email: document.getElementById('email'), password: document.getElementById('password') };
        const btns = { submit: document.getElementById('btn-submit'), google: document.getElementById('btn-google'), logout: document.getElementById('btn-logout'), toggle: document.getElementById('btn-toggle') };
        const ui = { 
            title: document.getElementById('form-title'), 
            toggleText: document.getElementById('toggle-text'),
            submitText: document.getElementById('btn-submit-text'),
            spinner: document.getElementById('loading-spinner'),
            alert: document.getElementById('alert-box'),
            userEmail: document.getElementById('user-email-display')
        };

        // --- 3. HELPER FUNCTIONS ---
        const showMessage = (msg, isError = false) => {
            ui.alert.textContent = msg;
            ui.alert.className = `mb-6 p-4 rounded-xl text-sm font-medium text-center ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'} fade-in`;
            ui.alert.classList.remove('hidden');
        };

        const hideMessage = () => ui.alert.classList.add('hidden');
        
        const setLoading = (loading) => {
            btns.submit.disabled = loading;
            btns.google.disabled = loading;
            if (loading) {
                ui.submitText.classList.add('hidden');
                ui.spinner.classList.remove('hidden');
            } else {
                ui.submitText.classList.remove('hidden');
                ui.spinner.classList.add('hidden');
            }
        };

        // --- 4. AUTH STATE LISTENER ---
        // FIXED: Using supabaseClient
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                views.auth.classList.add('hidden');
                views.dashboard.classList.remove('hidden');
                ui.userEmail.textContent = session.user.email;
            } else {
                views.dashboard.classList.add('hidden');
                views.auth.classList.remove('hidden');
                inputs.password.value = ''; // Clear password on logout
            }
        });

        // --- 5. EVENT LISTENERS ---
        // Toggle Login / Signup Mode
        btns.toggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            hideMessage();
            ui.title.textContent = isLoginMode ? 'Sign In' : 'Create Account';
            ui.toggleText.textContent = isLoginMode ? "Don't have an account?" : "Already have an account?";
            btns.toggle.textContent = isLoginMode ? 'Create one' : 'Sign in';
        });

        // Email Form Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();
            setLoading(true);

            const email = inputs.email.value;
            const password = inputs.password.value;

            try {
                // FIXED: Using supabaseClient
                const { error } = isLoginMode 
                    ? await supabaseClient.auth.signInWithPassword({ email, password })
                    : await supabaseClient.auth.signUp({ email, password });

                if (error) throw error;
                if (!isLoginMode) showMessage('Success! Check your email for a confirmation link.');
            } catch (err) {
                showMessage(err.message, true);
            } finally {
                setLoading(false);
            }
        });

        // Google Login
        btns.google.addEventListener('click', async () => {
            setLoading(true);
            // FIXED: Using supabaseClient
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) {
                showMessage(error.message, true);
                setLoading(false);
            }
        });

        // Logout
        btns.logout.addEventListener('click', async () => {
            btns.logout.disabled = true;
            btns.logout.textContent = "Signing out...";
            // FIXED: Using supabaseClient
            await supabaseClient.auth.signOut();
            btns.logout.disabled = false;
            btns.logout.textContent = "Sign Out";
        });
    </script>
</body>
</html>
